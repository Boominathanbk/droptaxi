<div class="row justify-content-center p-3">

  <!-- Pickup -->
  <div class="col-12 col-md-6 d-flex justify-content-center mb-3">
    <div class="d-flex align-items-center pickup-drop-container w-100" style="max-width:400px;">
      <i class="fa-solid fa-location-dot fa-lg me-3 mt-4" style="color: #21ea06;"></i>
      <div class="input-container w-100">
        <label for="pickup" class="form-label fw-bold">Pickup Location</label>
        <input type="text" id="pickup"
               class="form-control pickup-highlight"
               name="pickup"
               placeholder="Pickup Location"
               required>
        <small id="pickupError" style="color:red; display:none;"></small>
        <div id="pickupsuggestions" class="suggestions-container"></div>
      </div>
    </div>
  </div>

  <!-- Drop -->
  <div class="col-12 col-md-6 d-flex justify-content-center mb-3">
    <div class="d-flex align-items-center pickup-drop-container w-100" style="max-width:400px;">
      <i class="fa-solid fa-location-dot fa-lg me-3 mt-4" style="color: #c90505;"></i>
      <div class="input-container w-100">
        <label for="drop" class="form-label fw-bold">Drop Location</label>
        <input type="text" id="drop"
               class="form-control drop-highlight"
               name="drop"
               placeholder="Drop Location"
               required>
        <small id="dropError" style="color:red; display:none;"></small>
        <div id="dropsuggestions" class="suggestions-container"></div>
      </div>
    </div>
  </div>

</div>
